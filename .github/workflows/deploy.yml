name: Deploy to S3 and CloudFront

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: hiit-timer-production-deploy
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write  # CRITICAL: This allows the OIDC handshake

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build
        env:
          # Note: Switched URL to vars as we discussed
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_GA_MEASUREMENT_ID: ${{ vars.VITE_GA_MEASUREMENT_ID }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }} # The ARN of the role you just created
          aws-region: ${{ vars.AWS_REGION }}          # Switched to vars

      - name: Upload dist to S3
        run: aws s3 sync dist/ s3://exercise-tracker.bigya.com.np --delete

      - name: Invalidate CloudFront cache
        run: aws cloudfront create-invalidation --distribution-id E3M2MOYUTSFSZ0 --paths '/*'